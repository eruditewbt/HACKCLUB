<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Translation Editor</title>
  <style>
    body { font-family: sans-serif; margin: 2em; background: #fafafa; }
    textarea { width: 100%; height: 300px; }
    .section { margin-bottom: 2em; }
    .key { font-weight: bold; color: #2c3e50; }
  </style>
</head>
<body>
  <h1>Translation Editor</h1>
  <p>Edit <code>translated_sections.json</code> visually below:</p>
  <div id="editor"></div>
  <script>
    fetch('../translations/translated_sections.json')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('editor');
        for (const [section, entries] of Object.entries(data)) {
          const div = document.createElement('div');
          div.className = 'section';
          div.innerHTML = '<h3>' + section + '</h3>';
          for (const [key, langs] of Object.entries(entries)) {
            div.innerHTML += '<div class="key">' + key + '</div>';
            div.innerHTML += '<textarea>' + JSON.stringify(langs, null, 2) + '</textarea>';
          }
          container.appendChild(div);
        }
      });
  </script>
</body>
</html>
