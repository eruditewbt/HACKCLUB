name: web-platform-ci
on:
  push:
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile shared modules
        run: |
          python -m py_compile WEB/shared/config/env.py WEB/shared/auth/jwt_hs256.py WEB/shared/billing/stripe_webhook.py

